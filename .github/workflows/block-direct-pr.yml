name: Block direct PRs to main

on:
  pull_request:
    branches:
      - main

jobs:
  block:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          echo "Base: ${{ github.base_ref }}"
          echo "Head: ${{ github.head_ref }}"
          
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ Only PRs from dev are allowed to main"
            exit 1
          fi