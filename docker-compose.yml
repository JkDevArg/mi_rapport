version: "3.9"

services:
  rapport:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rapport-tool
    restart: unless-stopped

    environment:
      # ── Credentials (from .env file) ──────────────────
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      # ── SAP payload fields ────────────────────────────
      - PERNR=${PERNR:-65001734}
      - POSID=${POSID:-X19-80_CIESUR-OUT_003}
      - DESCR=${DESCR:-Desarrollo y análisis de migración en diferentes proyectos, pivoteo con otros clientes.}
      # ── Server ────────────────────────────────────────
      - PORT=8080
      - TZ=America/Lima
      - PYTHONUNBUFFERED=1

    ports:
      - "8080:8080"

    volumes:
      # Persist logs on host
      - ./logs:/app/logs
      # Live-reload credentials without rebuild
      - ./.env:/app/.env:ro

    # Playwright needs large /dev/shm
    shm_size: "512m"

    # Resource limits
    mem_limit: 1.5g
    cpus: "1.5"

    # Health check (Docker-level)
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
